name: Build & Release Windows Installer

on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./scopic
        run: npm install

      - name: Build renderer
        working-directory: ./scopic
        run: npx vite build

      - name: Build Windows installer
        working-directory: ./scopic
        run: npx electron-builder --win --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Scopic-Windows-Installer
          path: scopic/dist/*.exe
          retention-days: 30

      - name: Create GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Scopic ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## Scopic ${{ github.ref_name }}

            Auto-update release. Installed clients on a previous version will pick this up automatically on next launch.
          files: |
            scopic/dist/*.exe
            scopic/dist/*.exe.blockmap
            scopic/dist/latest.yml
          draft: false
          prerelease: false
