name: Build & Release Windows Installer

on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./scopic
        run: npm install

      - name: Rebuild native modules against Electron
        working-directory: ./scopic
        run: npx electron-builder install-app-deps

      - name: Build renderer
        working-directory: ./scopic
        run: npx vite build

      - name: Build Windows installer
        working-directory: ./scopic
        run: npx electron-builder --win --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Scopic-Windows-Installer
          path: scopic/dist/*.exe
          retention-days: 30

      - name: Create GitHub Release with gh CLI (preserves filenames)
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: ./scopic
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Delete release if it already exists (idempotent)
          gh release delete "$TAG" --yes --cleanup-tag=false 2>/dev/null || true
          # Create release and upload assets with exact filenames preserved
          gh release create "$TAG" \
            --title "Scopic $TAG" \
            --notes "Auto-update release. Installed clients pick this up automatically on next launch." \
            dist/*.exe dist/*.exe.blockmap dist/latest.yml
          # Verify the assets that latest.yml references actually exist
          echo "--- latest.yml content ---"
          cat dist/latest.yml
          echo "--- uploaded assets ---"
          gh release view "$TAG" --json assets --jq '.assets[].name'
